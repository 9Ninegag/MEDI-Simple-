kind = "web"
previewPath = "/"
title = "MediSimple"
version = "1.0.0"
id = "artifacts/medisimple"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20805

[services.development]
run = "pnpm --filter @workspace/medisimple run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medisimple", "run", "build" ]
publicDir = "artifacts/medisimple/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20805"
BASE_PATH = "/"
